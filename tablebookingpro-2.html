<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Booking</title>
    <style>

body {
  margin: 0;
  font-family: Arial;
  background: #F5E9DA;
}

/* TITLE */
h1 {
  text-align: center;
  padding: 30px;
}

/* FORM CONTAINER */
.form-box {
  background: white;
  width: 350px;
  margin: auto;
  padding: 25px;
  border-radius: 10px;
}

/* INPUT GROUP */
.form-group {
  margin-bottom: 15px;
}

/* LABEL */
label {
  display: block;
  margin-bottom: 5px;
  font-weight: bold;
}

/* INPUTS */
input, select, textarea {
  width: 100%;
  padding: 8px;
  border-radius: 5px;
  border: 1px solid #ccc;
}

/* TEXTAREA */
textarea {
  resize: none;
  height: 80px;
}

/* BUTTONS */
.buttons {
  text-align: center;
}

button {
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  margin: 5px;
  cursor: pointer;
}

/* BUTTON COLORS */
.submit {
  background: #C0392B;
  color: white;
}

.clear {
  background: #ccc;
}

.submit:hover {
  background: #E65100;
}

</style>
</head>
<body>
    <!DOCTYPE html>
<html>
<body>

<h1>Table Booking</h1>

<div class="form-box">
<form>

  <div class="form-group">
    <label>Name</label>
    <input type="text" placeholder="Enter Full Name" required>
  </div>

  <div class="form-group">
    <label>Phone Number</label>
    <input type="number" placeholder="Enter Phone Number" required>
  </div>

  <div class="form-group">
    <label>Email</label>
    <input type="email" required>
  </div>

  <div class="form-group">
    <label>Date</label>
    <input type="date" required>
  </div>

  <div class="form-group">
    <label>Time of Arrival</label>
    <input type="time" required>
  </div>

  <div class="form-group">
    <label>No. of People</label>
    <input type="number" required>
  </div>

  <div class="form-group">
    <label>Type of Food</label>
    <select>
      <option>Select</option>
      <option>Veg</option>
      <option>Non-Veg</option>
      <option>Both</option>
    </select>
  </div>

  <div class="form-group">
    <label>Special Request</label>
    <textarea></textarea>
  </div>

  <div class="buttons">
    <button class="submit">Submit</button>
    <button class="clear" type="reset">Clear</button>
  </div>

</form>
</div>

</body>
</html>
